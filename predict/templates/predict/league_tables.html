<div class="league-sidebar">
  <div class="sidebar-right">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h5>League Table</h5>
      <div class="d-flex align-items-center gap-1">
        <button id="lt-expand-btn" title="Show full stats" onclick="toggleLeagueExpand()" style="background:none;border:none;padding:2px 4px;cursor:pointer;color:var(--text-secondary);font-size:1rem;border-radius:4px;">
          <i class='bx bx-expand-alt' id="lt-expand-icon"></i>
        </button>
        <form method="get" class="ms-1">
          <select id="competition-select" name="competition" class="form-select form-select-sm" onchange="this.form.submit()">
            {% for code, name in competitions.items %}
              <option value="{{ code }}" {% if selected_competition == code %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
          </select>
        </form>
      </div>
    </div>
    <div id="league-table-container" class="table-responsive">
      <table class="table table-sm table-striped table-bordered mb-0" style="font-size: 0.78rem;">
        <thead class="league-table-header">
          <tr>
            <th>#</th>
            <th>Team</th>
            <th>PT</th>
            <th class="lt-extra">P</th>
            <th class="lt-extra">W</th>
            <th class="lt-extra">D</th>
            <th class="lt-extra">L</th>
          </tr>
        </thead>
        <tbody>
          {% for row in league_table %}
          <tr>
            <td>{{ forloop.counter }}</td>
            <td class="text-nowrap">
              <img src="{{ row.team.crest }}" class="team-logo me-1" alt="{{ row.team.shortName }}" style="width: 18px; height: 18px;">
              {{ row.team.shortName }}
            </td>
            <td>{{ row.points }}</td>
            <td class="lt-extra">{{ row.playedGames }}</td>
            <td class="lt-extra">{{ row.won }}</td>
            <td class="lt-extra">{{ row.draw }}</td>
            <td class="lt-extra">{{ row.lost }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

<style>
.lt-extra { display: none; }
#dash-row.league-expanded .lt-extra { display: table-cell; }

html body.dark .league-table-header {
  background: var(--table-header-bg) !important;
  color: var(--text-primary) !important;
}
html body.dark .table.table-striped > tbody > tr:nth-of-type(odd) > * {
  background-color: var(--hover-bg) !important;
}
html body.dark .table.table-striped > tbody > tr:nth-of-type(even) > * {
  background-color: var(--card-bg) !important;
}
html body.dark .table.table-bordered > * {
  border-color: var(--border-color) !important;
}
html body.dark .table td,
html body.dark .table th {
  color: var(--text-primary) !important;
}
</style>

<script>
function toggleLeagueExpand() {
  var row  = document.getElementById('dash-row');
  var icon = document.getElementById('lt-expand-icon');
  if (!row) return;
  var expanded = row.classList.toggle('league-expanded');
  icon.className = expanded ? 'bx bx-collapse-alt' : 'bx bx-expand-alt';
  localStorage.setItem('ltExpanded', expanded ? '1' : '0');
}
document.addEventListener('DOMContentLoaded', function() {
  if (localStorage.getItem('ltExpanded') === '1') {
    var row  = document.getElementById('dash-row');
    var icon = document.getElementById('lt-expand-icon');
    if (row)  row.classList.add('league-expanded');
    if (icon) icon.className = 'bx bx-collapse-alt';
  }
});
</script>
